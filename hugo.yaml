baseURL: "https://truepositive.me/"
title: "TruePositive"
pagination:
  pagerSize: 10
theme: PaperMod
languageCode: en-us
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: TruePositive
  description: "Security research, CTF writeups, and offensive/defensive insights."
  keywords: [security, ctf, pentesting, red team, writeups, malware]
  author: Mohammed Alzahrani
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: false

  label:
    text: "~/truepositive"

  homeInfoParams:
    Title: "Mohammed Alzahrani"
    Content: >
      Senior Cybersecurity Analyst | Threat Hunter | Cyber Security Researcher.
      OSTH | eCTHPv2 | eCIR — Writing about threat hunting, incident response, red team techniques, and security research.

  socialIcons:
    - name: github
      url: "https://github.com/mzalzahrani"
    - name: linkedin
      url: "https://www.linkedin.com/in/mohammed-a-alzahrani/"
    - name: rss
      url: "/index.xml"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/mzalzahrani/truepositive.me/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
